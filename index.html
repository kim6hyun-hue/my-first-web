<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jua&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=local_cafe"
    />
    <style>
      /* 전체 배경과 기본 글자색 */
      body {
        font-family: "Jua", serif;
        background-color: #f8f9fa;
        color: #333;
        line-height: 1.6; /* 줄 간격을 넓혀 읽기 편하게 만들기 */
        margin: 0;
      }

      /* 제목 부분 강조 */
      header {
        background-color: #2d3436;
        color: #dfe6e9;
        text-align: center;
        padding: 50px 0;
      }
      nav {
        text-align: center;
        padding: 15px;
        background-color: white;
      }
      nav a {
        margin: 0 15px;
        text-decoration: none;
        font-weight: bold;
        color: #3f72af;
      }
      img {
        display: block;
        margin: 30px auto;
        width: 250px;
        border-radius: 50%;
        border: 10px solid white;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      }
      header,
      footer {
        padding: 50px 0;
      }
      main {
        width: 80%;
        max-width: 800px;
        margin: 40px auto;
        padding: 30px;
        background-color: white;
        border: 1px solid #ddd;
      }
      .my-button {
        display: inline-block;
        padding: 15px 30px;
        background-color: #3f72af;
        color: white;
        text-decoration: none;
        border-radius: 30px;
        margin-top: 20px;
        transition: 0.3s;
      }

      /* 마우스를 올렸을 때(Hover) 효과 */
      .my-button:hover {
        background-color: #112d4e;
        transform: translateY(-3px);
      }
      footer {
        text-align: center;
      }
    </style>
    <title>Document</title>
  </head>
  <body>
    <header>
      <h1>
        <span class="material-symbols-outlined"> local_cafe </span>서두르지
        말고, 그러나 쉬지도 말고.
      </h1>
    </header>

    <nav>
      <a href="https://naver.com" target="_blank">네이버</a> |
      <a href="https://www.youtube.com/" target="_blank">유튜브</a>
    </nav>

    <main>
      <!-- 내 사진과 나를 소개하는 글 -->
      <img src="./images/me.jpg" alt="내 사진" width="300" />

      <ul>
        <li>좋아하는 것: 배드민턴, 노래</li>
        <li>나의 장점: 회복 탄력성, 끈기</li>
        <li>나의 목표: 어제보다 0.1% 나아지는 오늘을 만들자!!</li>
      </ul>
      <a href="#" class="my-button">나에 대해 더 알아보기</a>
    </main>
    <footer>
      &copy; 2026 김욱현 All rights reserved, 문의: kim6hyun@goedu.kr
    </footer>
  </body>
</html>
