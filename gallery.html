<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jua&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <header>
      <h1>
        <span class="material-symbols-outlined"> agriculture </span>서두르지
        말고, 그러나 쉬지도 말고.
      </h1>
    </header>

    <nav>
      <a href="index.html">홈</a> | <a href="subject.html">전공과목</a> |
      <a href="gallery.html">갤러리</a>
    </nav>

    <main>
      <h2>📸 실습 기록 갤러리</h2>

      <div class="display-box">
        <img
          id="targetImg"
          src="./images/crop1.jpg"
          style="width: 100%; max-width: 500px; border-radius: 10px"
        />
        <p id="targetDesc">4월 7일: 방울토마토 첫 수확!</p>
      </div>

      <div class="thumb-list">
        <img
          src="./images/crop1.jpg"
          alt="실습1"
          onclick="show('./images/crop1.jpg', '4월 7일: 방울토마토 첫 수확!')"
        />
        <img
          src="./images/crop2.jpg"
          alt="실습2"
          onclick="show('./images/crop2.jpg', '4월 9일: 비료 주기 실습 완료')"
        />
      </div>
    </main>
    <footer>
      &copy; 2026 김욱현 All rights reserved, 문의: kim6hyun@goedu.kr
    </footer>
    <script>
      function show(imgPath, text) {
        // 1. 이미지 경로 변경
        document.getElementById("targetImg").src = imgPath;
        // 2. 설명 텍스트 변경
        document.getElementById("targetDesc").innerText = text;
      }
    </script>
  </body>
</html>
